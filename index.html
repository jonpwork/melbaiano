<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Anime – Prompt Base</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

.container {
  width: 100%;
  max-width: 1100px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.image-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
}

.image-wrapper img {
  max-width: 280px;
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.prompt-card {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  backdrop-filter: blur(8px);
}

.prompt-card h1 {
  margin: 0;
  font-size: 1.4rem;
  text-align: center;
}

textarea {
  width: 100%;
  min-height: 260px;
  resize: vertical;
  border-radius: 14px;
  border: none;
  padding: 16px;
  font-size: 0.95rem;
  line-height: 1.5;
}

textarea:focus {
  outline: none;
}

.actions {
  display: flex;
  justify-content: center;
}

button {
  padding: 12px 28px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  font-weight: bold;
  background: linear-gradient(135deg, #ff9800, #ff5722);
  color: #fff;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

footer {
  font-size: 0.75rem;
  opacity: 0.6;
  text-align: center;
}

  </style>
</head>
<body>
  <div class="container"><!-- Imagem fixa do repositório -->
<div class="image-wrapper">
  <img src="./jonanime.png" alt="Avatar Anime Base" />
</div>

<!-- Card do prompt -->
<div class="prompt-card">
  <h1>Prompt Base (editável)</h1>
  <textarea id="prompt">

Crie uma imagem em um estilo de arte anime popular a partir do elemento enviado. Use line-work marcante, com leve variação, e cel shading mínimo com formas chapadas de sombra. Use cores brilhantes e saturadas e uma iluminação gráfica limpa. O estilo traz proporções de personagem exageradas e em estilo cartoon, com traços faciais simples e muito expressivos que permitem uma ampla gama de emoções, além de anatomia alongada e bem variada. Transforme o ambiente em um espaço levemente distorcido, com uma distorção de perspectiva divertida e objetos simplificados. A composição e o tom devem ter energia, animação e comicidade, em um mundo totalmente estilizado e não realista. </textarea>

<div class="actions">
    <button onclick="copiarPrompt()">Copiar prompt</button>
  </div>
</div>

<footer>
  Avatar anime • prompt base fixo • pronto para evoluir por emoções e cards
</footer>

  </div>  <script>
    function copiarPrompt() {
      const textarea = document.getElementById('prompt');
      textarea.select();
      textarea.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(textarea.value);
      alert('Prompt copiado!');
    }
  </script></body>
</html>
